{% extends "base.html" %}

{% block title %}@{{ profile_user.username }}{% endblock %}

{% block content %}
  <h1>@{{ profile_user.username }}</h1>

  {% if blogs %}
    <h2>Blogs</h2>
    <ul>
      {% for blog in blogs %}
        <li><a href="{% url 'blog:blog_detail' blog.slug %}">{{ blog.name }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <p>No blogs yet.</p>
  {% endif %}
{% endblock %}
