{% extends "base.html" %}

{% block title %}Delete {{ post.title }}{% endblock %}

{% block content %}
  <h1>Delete &ldquo;{{ post.title }}&rdquo;?</h1>
  <p>This permanently deletes the post. This cannot be undone.</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
    <a href="{% url 'blog:post_list' blog.slug %}">Cancel</a>
  </form>
{% endblock %}
