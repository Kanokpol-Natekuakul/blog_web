{% extends "base.html" %}

{% block title %}{% if is_create %}New post{% else %}Edit post{% endif %}{% endblock %}

{% block content %}
  <h1>{% if is_create %}New post in &ldquo;{{ blog.name }}&rdquo;{% else %}Edit {{ post.title }}{% endif %}</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
  </form>
  <p><a href="{% url 'blog:post_list' blog.slug %}">Back to posts</a></p>
{% endblock %}
