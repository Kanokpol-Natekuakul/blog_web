{% extends "base.html" %}

{% block title %}{% if is_create %}New blog{% else %}Edit blog{% endif %}{% endblock %}

{% block content %}
  <h1>{% if is_create %}New blog{% else %}Edit {{ blog.name }}{% endif %}</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save</button>
  </form>
  <p><a href="{% url 'blog:dashboard' %}">Back to my blogs</a></p>
{% endblock %}
