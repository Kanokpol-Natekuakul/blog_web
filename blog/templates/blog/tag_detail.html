{% extends "base.html" %}

{% block title %}#{{ tag.name }}{% endblock %}

{% block content %}
  <header class="section-head">
    <p class="eyebrow">Tag</p>
    <h1>#{{ tag.name }}</h1>
  </header>

  {% if posts %}
    <ul class="feed">
      {% for post in posts %}{% include "_post_row.html" %}{% endfor %}
    </ul>
  {% else %}
    <p class="empty">No posts with this tag yet.</p>
  {% endif %}
{% endblock %}
