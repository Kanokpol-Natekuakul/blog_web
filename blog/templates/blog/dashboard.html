{% extends "base.html" %}

{% block title %}My blogs{% endblock %}

{% block content %}
  <h1>My blogs</h1>
  <p><a href="{% url 'blog:blog_create' %}">+ New blog</a></p>

  {% if blogs %}
    <ul>
      {% for blog in blogs %}
        <li>
          <a href="{% url 'blog:blog_detail' blog.slug %}">{{ blog.name }}</a>
          <code>/{{ blog.slug }}</code>
          &mdash;
          <a href="{% url 'blog:post_list' blog.slug %}">Manage posts</a>
          <a href="{% url 'blog:blog_edit' blog.slug %}">Edit</a>
          <a href="{% url 'blog:blog_delete' blog.slug %}">Delete</a>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p>You have no blogs yet.</p>
  {% endif %}
{% endblock %}
