{% extends "base.html" %}
{% load blog_extras %}

{% block title %}{{ post.title }} — {{ post.blog.name }}{% endblock %}

{% block content %}
  <article>
    <h1>{{ post.title }}</h1>
    <p>
      <a href="{% url 'blog:blog_detail' post.blog.slug %}">{{ post.blog.name }}</a>
    </p>
    <div>{{ post.body|markdownify }}</div>
  </article>
{% endblock %}
