# Render Blueprint — provisions the web service + PostgreSQL in one step.
# In the Render dashboard: New → Blueprint → connect this repo. Render reads
# this file, creates everything, and asks you to fill the email vars below.
# Docs: https://render.com/docs/blueprint-spec  ·  see also docs/deploy.md

databases:
  - name: blog-db
    plan: free
    region: singapore          # MUST match the web service's region for
    databaseName: blog         # private (internal) networking to resolve
    user: blog

services:
  - type: web
    name: blog-web
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    # migrate before serving; gunicorn serves the WSGI app
    startCommand: "python manage.py migrate && gunicorn config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: SECRET_KEY
        generateValue: true          # Render generates a strong secret
      - key: DEBUG
        value: "False"               # turns on SSL redirect, secure cookies, HSTS
      - key: DATABASE_URL
        fromDatabase:
          name: blog-db
          property: connectionString
      # ALLOWED_HOSTS / CSRF are derived from RENDER_EXTERNAL_HOSTNAME in settings.
      # ---- Email via Brevo HTTPS API (Render blocks outbound SMTP ports). ----
      # BREVO_API_KEY = a v3 API key from Brevo (SMTP & API → API Keys).
      # DEFAULT_FROM_EMAIL = a sender verified in Brevo → Senders.
      - key: BREVO_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # Cloudinary stores uploaded cover images (filesystem is ephemeral).
      # CLOUDINARY_URL = cloudinary://<api_key>:<api_secret>@<cloud_name>
      - key: CLOUDINARY_URL
        sync: false
